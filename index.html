<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ferra Creative Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e1b4b;--primary-l:#312e81;--accent:#4f46e5;
  --bg:#f0f2f8;--surface:#fff;--border:#e5e7eb;
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --good:#059669;--good-bg:#ecfdf5;
  --avg:#d97706;--avg-bg:#fffbeb;
  --poor:#dc2626;--poor-bg:#fef2f2;
  --active-c:#059669;--active-bg:#dcfce7;
  --paused-c:#9ca3af;--paused-bg:#f3f4f6;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh}
.hdr{background:var(--primary);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr .sub{font-size:12px;opacity:.55;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:12px}
.refresh-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background .15s}
.refresh-btn:hover{background:rgba(255,255,255,.22)}
.refresh-btn .spin{display:inline-block;transition:transform .3s}
.refresh-btn.loading .spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-upd{font-size:11px;opacity:.5;white-space:nowrap}
.stats{display:flex;gap:12px;padding:20px 28px 0;flex-wrap:wrap}
.stat{background:var(--surface);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow);flex:1;min-width:110px}
.stat .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3)}
.stat .val{font-size:22px;font-weight:700;color:var(--primary);margin-top:4px;line-height:1.1}
.stat .sub2{font-size:11px;color:var(--txt3);margin-top:3px}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin:14px 28px 0}
.filter-bar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid var(--border)}
.qf-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.qf-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-right:2px}
.qf{border:1px solid var(--border);background:#fff;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);transition:all .12s;white-space:nowrap;font-family:inherit}
.qf:hover{border-color:var(--accent);color:var(--accent)}
.qf.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.dr-wrap{display:flex;align-items:center;gap:8px}
.dr-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3)}
.dr-in{border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--txt);background:#fff;outline:none;font-family:inherit}
.dr-in:focus{border-color:var(--accent);box-shadow:0 0 0 2px #eef2ff}
.dr-sep{color:var(--txt3);font-size:12px}
.dr-clr{border:none;background:none;color:var(--txt3);font-size:12px;cursor:pointer;padding:3px 8px;border-radius:6px;font-family:inherit}
.dr-clr:hover{background:var(--border);color:var(--txt)}
.controls{padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;width:240px;outline:none;font-family:inherit;color:var(--txt)}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 2px #eef2ff}
.tog-grp{display:flex;background:#f3f4f6;border-radius:8px;padding:3px}
.tog{border:none;background:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);font-family:inherit;transition:all .12s}
.tog.on{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.rcount{font-size:12px;color:var(--txt3);margin-left:auto}
table{width:100%;border-collapse:collapse;font-size:13px;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
th{background:var(--primary);color:rgba(255,255,255,.9);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.3px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:var(--primary-l)}
th .si{margin-left:3px;opacity:.4;font-size:10px}
th.srt .si{opacity:1}
td{padding:10px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child>td{border-bottom:none}
tr.main-row:hover>td{background:#f6f8ff}
tr.exp-row td{background:#f8f9fc;padding:12px 16px 14px}
.ad-cell{cursor:pointer;position:relative}
.ad-name{font-weight:600;color:var(--primary);font-size:13px;line-height:1.3;display:block}
.ad-name:hover{text-decoration:underline;color:var(--accent)}
.ad-sub{font-size:11px;color:var(--txt3);margin-top:1px;display:block}
.tip{position:absolute;left:0;top:calc(100% + 6px);background:#1f2937;color:#e5e7eb;border-radius:10px;padding:10px 14px;font-size:12px;line-height:1.55;width:310px;z-index:200;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 6px 20px rgba(0,0,0,.3);white-space:normal}
.ad-cell:hover .tip{opacity:1}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.act{background:var(--active-bg);color:var(--active-c)}
.badge.pau{background:var(--paused-bg);color:var(--paused-c)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px;min-width:54px}
.pill.good{color:var(--good);background:var(--good-bg)}
.pill.avg{color:var(--avg);background:var(--avg-bg)}
.pill.poor{color:var(--poor);background:var(--poor-bg)}
.pill.na{color:var(--txt3);background:transparent;font-weight:400;min-width:unset}
.more-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.more-btn:hover{border-color:var(--accent);color:var(--accent)}
.more-btn.open{background:var(--accent);color:#fff;border-color:var(--accent)}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.exp-card{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid var(--border)}
.exp-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3)}
.exp-val{font-size:15px;font-weight:700;color:var(--primary);margin-top:3px}
#no-results{display:none;text-align:center;padding:48px;color:var(--txt3);font-size:14px}
.modal-ov{position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);padding:26px}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:var(--primary);line-height:1.4;flex:1;margin-right:12px}
.mc{background:none;border:none;font-size:18px;cursor:pointer;color:var(--txt3);padding:2px 6px;border-radius:4px;line-height:1}
.mc:hover{background:var(--border)}
.msec{margin-bottom:14px}
.msec .ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);margin-bottom:5px}
.msec .mt{font-size:13px;color:var(--txt);line-height:1.6;background:#f8f9fc;border-radius:8px;padding:10px 14px}
.mchips{display:flex;gap:7px;flex-wrap:wrap}
.mchip{background:#f3f4f6;border-radius:6px;padding:4px 10px;font-size:12px;color:var(--txt2);font-weight:500}
.cph{background:#f8f9fc;border:2px dashed var(--border);border-radius:10px;padding:30px;text-align:center;color:var(--txt3)}
.cph .ico{font-size:28px;margin-bottom:6px}
.cph p{font-size:12px;line-height:1.5}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.75);z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}
#loading.show{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
</style>
</head>

    <th style="width:70px"></th>
  </tr></thead>
  <tbody id="tbody"></tbody>
  </table>
  <div id="no-results">No ads match your filters.</div>
  </div>
</div>

<div style="height:32px"></div>

<div class="modal-ov" id="mov" onclick="cModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="mt"></div>
      <button class="mc" onclick="cModalD()">&#10005;</button>

    <div class="msec">
      <div class="ml">Creative preview</div>
      <div id="creative-container"></div>

</div>

function aggDaily(since,until){
  const fd=DALY.filter(r=>r.date>=since&&r.date<=until);
  if(!fd.length) return [];
  const bk={};
  for(const r of fd){
    const k=r.name;
    if(!bk[k]) bk[k]={...r,impressions:0,spend:0,clicks:0,leads:0,plays:0,p25:0,p50:0,p75:0,p100:0,ws:0,wi:0,reach:0};
    const b=bk[k];
    b.impressions+=r.impressions; b.spend+=r.spend; b.clicks+=r.clicks; b.leads+=r.leads;
    b.plays+=r.plays; b.p25+=r.p25; b.p50+=r.p50; b.p75+=r.p75; b.p100+=r.p100; b.reach+=r.reach;
    if(r.avg_watch>0){b.ws+=r.avg_watch*r.impressions; b.wi+=r.impressions;}
  }
  return Object.values(bk).map(b=>calc(b)).sort((a,b2)=>a.num-b2.num);
}

function calc(b){
  const imp=b.impressions, pl=b.plays, p25=b.p25, p50=b.p50, p75=b.p75, p100=b.p100;
  const v2s=b.v2s||0;
  const ctr=imp>0?+(b.clicks/imp*100).toFixed(2):0;
  const cpl=b.leads>0?Math.round(b.spend/b.leads):0;
  const hook=pl>0?+(p25/pl*100).toFixed(1):0;
  // Skip rate from Meta: % of plays that didn't reach 2 continuous seconds
  const skip=pl>0?(v2s>0?+((pl-v2s)/pl*100).toFixed(1):+((pl-p25)/pl*100).toFixed(1)):null;
  let ret=0;
  if(pl>0){const g0=Math.max(pl-p25,0),g25=Math.max(p25-p50,0),g50=Math.max(p50-p75,0),g75=Math.max(p75-p100,0); ret=+((g0*12.5+g25*37.5+g50*62.5+g75*87.5+p100*100)/pl).toFixed(1);}
  return{...b,ctr,cpl,hook_rate:hook,skip_rate:skip,retention:ret,avg_watch:b.wi>0?+(b.ws/b.wi).toFixed(1):0,is_video:pl>0,spend:+b.spend.toFixed(2),cpm:imp>0?+(b.spend/imp*1000).toFixed(2):0};
}

async function fetchLive(since,until,label){
  document.getElementById('loading').classList.add('show');
  try{
    const flds=['ad_id','ad_name','adset_name','campaign_name','impressions','clicks','spend','reach','actions','video_play_actions','video_p25_watched_actions','video_p50_watched_actions','video_p75_watched_actions','video_p100_watched_actions','video_avg_time_watched_actions'].join(',');
    const p=new URLSearchParams({level:'ad',fields:flds,limit:'500',time_range:JSON.stringify({since,until}),access_token:TOK});
    let url=`https://graph.facebook.com/${APIV}/${ACC}/insights?${p}`, all=[];
    while(url){const r=await fetch(url); const d=await r.json(); if(d.error) throw new Error(d.error.message); all=all.concat(d.data||[]); url=d.paging?.next||null;}
    rows=procLive(all); setLabel(label); clearQ();
    document.getElementById('last-upd').textContent='Live · '+new Date().toLocaleTimeString();
  }catch(e){alert('API error: '+e.message);}
  finally{document.getElementById('loading').classList.remove('show'); applyFilters();}
}

function procLive(raw){
  const bk={};
  const gq=arr=>arr?.find(a=>a.action_type==='video_view')?+arr.find(a=>a.action_type==='video_view').value:0;
  const ga=(arr,t)=>arr?.find(a=>a.action_type===t)?+arr.find(a=>a.action_type===t).value:0;
  for(const ad of raw){
    const k=ad.ad_name; const nm=k.match(/^(\d+)[_\s]/)?+k.match(/^(\d+)[_\s]/)[1]:9999;
    if(!bk[k]) bk[k]={name:k,num:nm,impressions:0,spend:0,clicks:0,leads:0,plays:0,p25:0,p50:0,p75:0,p100:0,ws:0,wi:0,reach:0,adset:ad.adset_name||'',status:'ACTIVE',description:''};
    const b=bk[k]; const imp=+ad.impressions||0; const aw=gq(ad.video_avg_time_watched_actions);
    b.impressions+=imp; b.spend+=+ad.spend||0; b.clicks+=+ad.clicks||0; b.leads+=ga(ad.actions,'lead');
    b.plays+=gq(ad.video_play_actions); b.p25+=gq(ad.video_p25_watched_actions); b.p50+=gq(ad.video_p50_watched_actions);
    b.p75+=gq(ad.video_p75_watched_actions); b.p100+=gq(ad.video_p100_watched_actions); b.reach+=+ad.reach||0;
    if(aw>0){b.ws+=aw*imp; b.wi+=imp;}
  }
  return Object.values(bk).map(b=>calc(b)).sort((a,b2)=>a.num-b2.num);
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  let r=rows.filter(x=>{
    if(stFlt==='active'&&x.status!=='ACTIVE') return false;
    if(tyFlt==='video'&&!x.is_video) return false;
    if(tyFlt==='static'&&x.is_video) return false;
    if(q&&!(x.name||'').toLowerCase().includes(q)&&!(x.adset||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if(scol>=0) r=sortR(r);
  render(r); buildStats(r);
  document.getElementById('rcount').textContent=r.length+' ads';
}

function render(r){
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  if(!r.length){document.getElementById('no-results').style.display='block'; return;}
  document.getElementById('no-results').style.display='none';
  r.forEach((x,i)=>{
    const tr=document.createElement('tr'); tr.className='main-row';
    const desc=(x.description||x.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tip=desc?`<div class="tip">${desc}</div>`:'';
    const rj=esc(JSON.stringify(x));
    tr.innerHTML=`
      <td style="text-align:center;font-weight:700;color:var(--txt3);font-size:12px">${x.num===9999?'—':x.num}</td>
      <td><div class="ad-cell" onclick="oModal('${rj}')">
        <span class="ad-name">${esc((x.name||'').slice(0,54))}</span>
        <span class="ad-sub">${esc((x.adset||'').slice(0,44))}</span>
        ${tip}
      </div></td>
      <td>${sbadge(x.status)}</td>
      <td style="text-align:center">${pill(x.ctr,'ctr')}</td>
      <td style="text-align:center">${x.skip_rate===null?na():pill(x.skip_rate,'sk')}</td>
      <td style="text-align:center">${x.is_video?pill(x.retention,'ret'):na()}</td>
      <td style="text-align:right">${x.cpl?pill(x.cpl,'cpl'):na()}</td>
      <td><button class="more-btn" onclick="tog(this,${i})">&#9658; More</button></td>`;
    tb.appendChild(tr);
    const ex=document.createElement('tr'); ex.className='exp-row'; ex.style.display='none'; ex.setAttribute('data-e',i);
    ex.innerHTML=`<td colspan="8"><div class="exp-grid">
      ${ec('Spend','&#8377;'+fn(Math.round(x.spend)))}
      ${ec('Impressions',fn(x.impressions))}
      ${ec('Reach',fn(x.reach))}
      ${ec('Leads',x.leads||'0')}
      ${ec('Hook Rate',x.is_video?x.hook_rate+'%':'—')}
      ${ec('Avg Watch',x.is_video?x.avg_watch+'s':'—')}
      ${ec('CPM','&#8377;'+fn(Math.round(x.cpm||0)))}
      ${ec('Campaign',(x.campaign||'—').slice(0,28))}
    </div></td>`;
    tb.appendChild(ex);
  });
}

function pill(v,t){
  let c='na';
  if(t==='ctr') c=v>=3?'good':v>=1.5?'avg':'poor';
  if(t==='sk')  c=v<50?'good':v<70?'avg':'poor';
  if(t==='ret') c=v>=25?'good':v>=15?'avg':'poor';
  if(t==='cpl') c=v<=600?'good':v<=1500?'avg':'poor';
  const d=(t==='cpl'?'&#8377;':'')+v+(t==='cpl'?'':'%');
  return`<span class="pill ${c}">${d}</span>`;
}
function na(){return`<span style="color:var(--txt3)">—</span>`;}

function tog(btn,i){
  const ex=document.querySelector(`[data-e="${i}"]`);
  const open=ex.style.display==='table-row';
  ex.style.display=open?'none':'table-row';
  btn.innerHTML=open?'&#9658; More':'&#9660; Less';
  btn.classList.toggle('open',!open);
}

function buildStats(r){
  const sp=r.reduce((s,x)=>s+(x.spend||0),0);
  const ld=r.reduce((s,x)=>s+(x.leads||0),0);
  const ac=r.filter(x=>x.status==='ACTIVE').length;
  const cp=ld>0?Math.round(sp/ld):0;
  document.getElementById('stat-bar').innerHTML=`
    <div class="stat"><div class="lbl">Total Ads</div><div class="val">${r.length}</div><div class="sub2">${ac} active</div></div>
    <div class="stat"><div class="lbl">Total Spend</div><div class="val">&#8377;${fn(Math.round(sp))}</div></div>
    <div class="stat"><div class="lbl">Total Leads</div><div class="val">${ld}</div></div>
    <div class="stat"><div class="lbl">Avg CPL</div><div class="val">${cp?'&#8377;'+fn(cp):'—'}</div></div>`;
}

function srt(c,t){
  if(scol===c) sdir*=-1; else{scol=c; sdir=-1;}  // default descending on first click
  document.querySelectorAll('th').forEach((th,i)=>{th.classList.toggle('srt',i===c); const si=th.querySelector('.si'); if(si) si.innerHTML=i===c?(sdir===-1?' &#8595;':' &#8593;'):' &#8645;';});
  applyFilters();
}

function sortR(r){
  const cols=[x=>x.num,x=>x.name||'',x=>x.status||'',x=>x.ctr||0,x=>x.skip_rate||0,x=>x.retention||0,x=>x.cpl||0];
  const fn2=cols[scol]||cols[0];
  return[...r].sort((a,b)=>{const va=fn2(a),vb=fn2(b); return typeof va==='number'?(va-vb)*sdir:String(va).localeCompare(String(vb))*sdir;});
}

function setSt(m,btn){
  stFlt=m; document.querySelectorAll('.tog').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  // Also re-activate the companion toggle
  btn.parentElement.querySelectorAll('.tog').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  applyFilters();
}
function setTy(m,btn){
  tyFlt=m; btn.parentElement.querySelectorAll('.tog').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  applyFilters();
}

function oModal(rj){
  const x=JSON.parse(rj);
  document.getElementById('mt').textContent=x.name||'';
  document.getElementById('md').textContent=x.description||'No description available.';
  const mm=document.getElementById('mm'); mm.innerHTML='';
  [x.status, x.is_video?'Video':'Static', x.adset||'', x.leads?x.leads+' leads':'No leads yet', x.cpl?'CPL &#8377;'+x.cpl:''].filter(Boolean).forEach(c=>{const s=document.createElement('span');s.className='mchip';s.innerHTML=c;mm.appendChild(s);});
  // Creative preview
  const cc=document.getElementById('creative-container');
  const driveInfo=DMAP[String(x.num)];
  if(driveInfo){
    const fid=driveInfo.file_id;
    if(driveInfo.type==='video'){
      cc.innerHTML=`<div style="position:relative;width:100%;background:#000;border-radius:10px;overflow:hidden">
        <iframe src="https://drive.google.com/file/d/${fid}/preview" width="100%" height="300" frameborder="0" allow="autoplay" allowfullscreen style="display:block"></iframe>
      </div>`;
    } else {
      cc.innerHTML=`<div style="background:#000;border-radius:10px;overflow:hidden;text-align:center">
        <img src="https://drive.google.com/thumbnail?id=${fid}&sz=w600-h400" style="max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto" onerror="this.src='https://drive.google.com/uc?export=view&id=${fid}'"/>
      </div>`;
    }
  } else {
    cc.innerHTML=`<div class="cph"><div class="ico">&#127916;</div><p>Upload ad #${x.num} to your <a href="https://drive.google.com/drive/folders/17kdXyPWdHYTqtWLzkdcV9LKeSOcfxo5r" target="_blank" style="color:var(--accent)">Drive folder</a> to enable preview.</p></div>`;
  }
  document.getElementById('mov').classList.add('show');
}
function cModal(e){if(e.target.id==='mov') cModalD();}
function cModalD(){document.getElementById('mov').classList.remove('show');}

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fn(n){return(+n||0).toLocaleString('en-IN');}

initDays();
applyFilters();
</script>
</body></html>
